{% extends 'layout/base.html' %}
{% block title %}Semillero - Línea{% endblock %}

{% block content %}
<div class="container mt-4">

    <h2>Relaciones Semillero - Línea</h2>

    <a href="{{ url_for('semillero_linea.crear') }}" class="btn btn-success mb-3">
        Nueva Relación
    </a>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Semillero</th>
                <th>Línea</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for reg in registros %}
            <tr>
                <td>{{ reg.semillero }}</td>
                <td>{{ reg.linea_investigacion }}</td>
                <td>
                    <a href="{{ url_for('semillero_linea.editar', semillero=reg.semillero) }}" class="btn btn-warning btn-sm">Editar</a>

                    <form method="POST" action="{{ url_for('semillero_linea.eliminar') }}" style="display:inline;">
                        <input type="hidden" name="semillero" value="{{ reg.semillero }}">
                        <button class="btn btn-danger btn-sm">Eliminar</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>
{% endblock %}
