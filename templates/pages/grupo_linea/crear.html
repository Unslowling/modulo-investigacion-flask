{% extends 'layout/base.html' %}
{% block title %}Nueva Relación Grupo - Línea{% endblock %}

{% block content %}
<div class="container mt-4">

    <h2>Nueva Relación</h2>

    <form method="POST">
        <div class="mb-3">
            <label>Grupo Investigación ID</label>
            <input type="number" name="grupo_investigacion" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Línea Investigación ID</label>
            <input type="number" name="linea_investigacion" class="form-control" required>
        </div>

        <button class="btn btn-primary">Guardar</button>
    </form>

</div>
{% endblock %}
