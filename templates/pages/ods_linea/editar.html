{% extends 'layout/base.html' %}

{% block title %}Editar Relación ODS - Línea{% endblock %}

{% block content %}
<div class="container-fluid mt-4 px-4 pb-4">

    <div class="row">
        <div class="col-12">
            <h2 class="fw-bold mb-1">Editar Relación ODS - Línea</h2>
            <p class="text-muted mb-4">Al reemplazar, se reescribirá la relación para las opciones elegidas</p>
        </div>
    </div>

    <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 700px;">
        
        <div class="card-body p-4 p-md-5">
            <form method="POST" action="{{ url_for('ods_linea.editar', linea_id=linea_id, ods_id=ods_id) }}" 
                  onsubmit="return confirm('¿Está seguro de actualizar (reemplazar) esta relación?');">
                
                <div class="mb-4">
                    <label for="linea_investigacion" class="form-label fw-bold">Línea de Investigación</label>
                    <select class="form-select" id="linea_investigacion" name="linea_investigacion" required style="border-radius: 8px; padding: 10px;">
                        {% for linea in lineas %}
                            <option value="{{ linea.id }}" {% if linea.id|string == linea_id|string %}selected{% endif %}>
                                {{ linea.nombre }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-5">
                    <label for="ods" class="form-label fw-bold">Objetivo de Desarrollo Sostenible (ODS)</label>
                    <select class="form-select" id="ods" name="ods" required style="border-radius: 8px; padding: 10px;">
                        {% for o in odss %}
                            <option value="{{ o.id }}" {% if o.id|string == ods_id|string %}selected{% endif %}>
                                {{ o.nombre }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="d-flex justify-content-end mt-2">
                    <a href="{{ url_for('ods_linea.index') }}" class="btn btn-secondary me-3 text-white rounded-pill px-4 py-2 fw-medium">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-success rounded-pill px-4 py-2 fw-medium">
                        Actualizar Relación
                    </button>
                </div>
                
            </form>
        </div>
    </div>

</div>
{% endblock %}
