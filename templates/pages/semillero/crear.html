{% extends 'layout/base.html' %}

{% block title %}Nuevo Semillero{% endblock %}

{% block content %}
<div class="container-fluid mt-4 px-4 pb-4">

    <h2 class="fw-bold mb-1">Nuevo Semillero</h2>
    <p class="text-muted mb-4">Registro en el catálogo</p>

    <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 700px;">
        <div class="card-body p-4 p-md-5">

            <form method="POST" action="{{ url_for('semillero.crear') }}">

                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre</label>
                    <input type="text" name="nombre" class="form-control" required maxlength="60">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Fecha Fundación</label>
                    <input type="date" name="fecha_fundacion" class="form-control">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Grupo Investigación (ID)</label>
                    <input type="number" name="grupo_investigacion" class="form-control">
                </div>

                <div class="d-flex justify-content-end">
                    <a href="{{ url_for('semillero.index') }}" class="btn btn-secondary me-3">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>

            </form>

        </div>
    </div>

</div>
{% endblock %}
