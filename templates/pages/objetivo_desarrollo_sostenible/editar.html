{% extends 'layout/base.html' %}

{% block title %}Editar ODS{% endblock %}

{% block content %}
<div class="container-fluid mt-4 px-4 pb-4">

    <div class="row">
        <div class="col-12">
            <h2 class="fw-bold mb-1">Editar Objetivo de Desarrollo Sostenible</h2>
            <p class="text-muted mb-4">Modifica los datos del registro</p>
        </div>
    </div>

    <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 700px;">
        
        <div class="card-body p-4 p-md-5">
            <form method="POST" action="{{ url_for('objetivo_desarrollo_sostenible.editar', registro_id=registro.id) }}"
                  onsubmit="return confirm('¿Está seguro de actualizar el ODS?');">
                
                <div class="mb-4">
                    <label for="nombre" class="form-label fw-bold">Nombre</label>
                    <input type="text" class="form-control" style="border-radius: 8px; padding: 10px;"
                           id="nombre" name="nombre" required maxlength="60"
                           value="{{ registro.nombre }}">
                </div>
                
                <div class="mb-5">
                    <label for="categoria" class="form-label fw-bold">Categoría</label>
                    <input type="text" class="form-control" style="border-radius: 8px; padding: 10px;"
                           id="categoria" name="categoria" required maxlength="45"
                           list="categorias-ods"
                           value="{{ registro.categoria }}">
                    <datalist id="categorias-ods">
                        <option value="Social"></option>
                        <option value="Ambiental"></option>
                        <option value="Económica"></option>
                        <option value="Institucional"></option>
                        <option value="Global"></option>
                    </datalist>
                </div>
                
                <div class="d-flex justify-content-end mt-2">
                    <a href="{{ url_for('objetivo_desarrollo_sostenible.index') }}" class="btn btn-secondary me-3 text-white rounded-pill px-4 py-2 fw-medium">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-success rounded-pill px-4 py-2 fw-medium">
                        Actualizar Registro
                    </button>
                </div>
                
            </form>
        </div>
    </div>

</div>
{% endblock %}
