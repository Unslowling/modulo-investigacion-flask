{% extends 'layout/base.html' %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white text-center">
                <h4>Validación de Seguridad</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted text-center mb-4">Ingresa tus credenciales para acceder al sistema.</p>
                
                <form method="POST" action="{{ url_for('autenticacion.login') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold">Correo Electrónico</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="tu@email.com" autofocus>
                    </div>
                    
                    <div class="mb-4">
                        <label for="contrasena" class="form-label fw-bold">Contraseña</label>
                        <input type="password" class="form-control" id="contrasena" name="contrasena" required placeholder="••••••••">
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="text-center mt-3 text-muted">
            <small>Este sistema requiere un JWT Token para interactuar con la Base de Datos.</small>
        </div>
    </div>
</div>
{% endblock %}
