{% extends 'layout/base.html' %}

{% block title %}Nuevo Grupo de Investigación{% endblock %}

{% block content %}
<div class="container-fluid mt-4 px-4 pb-4">

    <h2 class="fw-bold mb-1">Nuevo Grupo de Investigación</h2>
    <p class="text-muted mb-4">Registro en el catálogo</p>

    <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 800px;">
        <div class="card-body p-4 p-md-5">

            <form method="POST" action="{{ url_for('grupo_investigacion.crear') }}">

                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre</label>
                    <input type="text" name="nombre" class="form-control" required maxlength="60">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">URL GrupLAC</label>
                    <input type="text" name="url_gruplac" class="form-control" maxlength="128">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Categoría</label>
                    <input type="text" name="categoria" class="form-control" maxlength="10">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Convocatoria</label>
                    <input type="text" name="convocatoria" class="form-control" maxlength="10">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Fecha Fundación</label>
                    <input type="date" name="fecha_fundacion" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Universidad ID</label>
                    <input type="number" name="universidad_id" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Interno</label>
                    <select name="interno" class="form-control">
                        <option value="1">Sí</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Ámbito</label>
                    <input type="text" name="ambito" class="form-control" maxlength="45">
                </div>

                <div class="d-flex justify-content-end">
                    <a href="{{ url_for('grupo_investigacion.index') }}" class="btn btn-secondary me-3">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>

            </form>

        </div>
    </div>

</div>
{% endblock %}
