{% extends 'layout/base.html' %}

{% block title %}Nueva Relación AA - Línea{% endblock %}

{% block content %}
<div class="container-fluid mt-4 px-4 pb-4">

    <div class="row">
        <div class="col-12">
            <h2 class="fw-bold mb-1">Nueva Relación AA - Línea</h2>
            <p class="text-muted mb-4">Registro en tabla puente</p>
        </div>
    </div>

    <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 700px;">
        
        <div class="card-body p-4 p-md-5">
            <form method="POST" action="{{ url_for('aa_linea.crear') }}">
                
                <div class="mb-4">
                    <label for="area_aplicacion" class="form-label fw-bold">Área de Aplicación</label>
                    <select class="form-select" id="area_aplicacion" name="area_aplicacion" required style="border-radius: 8px; padding: 10px;">
                        <option value="" disabled selected>-- Seleccione un Área --</option>
                        {% for area in areas %}
                            <option value="{{ area.id }}">{{ area.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-5">
                    <label for="linea_investigacion" class="form-label fw-bold">Línea de Investigación</label>
                    <select class="form-select" id="linea_investigacion" name="linea_investigacion" required style="border-radius: 8px; padding: 10px;">
                        <option value="" disabled selected>-- Seleccione una Línea --</option>
                        {% for linea in lineas %}
                            <option value="{{ linea.id }}">{{ linea.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="d-flex justify-content-end mt-2">
                    <a href="{{ url_for('aa_linea.index') }}" class="btn btn-secondary me-3 text-white rounded-pill px-4 py-2 fw-medium">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary rounded-pill px-4 py-2 fw-medium">
                        Guardar Relación
                    </button>
                </div>
                
            </form>
        </div>
    </div>

</div>
{% endblock %}
