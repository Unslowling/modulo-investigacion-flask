{% extends 'layout/base.html' %}

{% block title %}Editar Línea de Investigación{% endblock %}

{% block content %}
<div class="container-fluid mt-4 px-4 pb-4">

    <div class="row">
        <div class="col-12">
            <h2 class="fw-bold mb-1">Editar Línea de Investigación</h2>
            <p class="text-muted mb-4">Actualizar el catálogo de investigación</p>
        </div>
    </div>

    <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 700px;">
        
        <div class="card-body p-4 p-md-5">
            <form method="POST" action="{{ url_for('linea_investigacion.editar', id=registro.id) }}"
                  onsubmit="return confirm('¿Está seguro de actualizar la Línea de Investigación?');">
                
                <div class="mb-4">
                    <label for="id_display" class="form-label fw-bold">ID</label>
                    <input type="text" class="form-control text-muted" style="border-radius: 8px; padding: 10px; background-color: #f8f9fa; border: 1px solid #dee2e6;"
                           id="id_display" value="{{ registro.id }}" readonly>
                </div>

                <div class="mb-4">
                    <label for="nombre" class="form-label fw-bold">Nombre</label>
                    <input type="text" class="form-control" style="border-radius: 8px; padding: 10px;"
                           id="nombre" name="nombre" value="{{ registro.nombre }}" required maxlength="45">
                </div>
                
                <div class="mb-5">
                    <label for="descripcion" class="form-label fw-bold">Descripción</label>
                    <textarea class="form-control" style="border-radius: 8px; padding: 10px;"
                              id="descripcion" name="descripcion" rows="4" required maxlength="256">{{ registro.descripcion }}</textarea>
                </div>
                
                <div class="d-flex justify-content-end mt-2">
                    <a href="{{ url_for('linea_investigacion.index') }}" class="btn btn-secondary me-3 text-white rounded-pill px-4 py-2 fw-medium">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary rounded-pill px-4 py-2 fw-medium">
                        Actualizar Registro
                    </button>
                </div>
                
            </form>
        </div>
    </div>

</div>
{% endblock %}
